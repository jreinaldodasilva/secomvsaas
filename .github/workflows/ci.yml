name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8
        ports: ['27017:27017']
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install types package
        run: cd packages/types && npm ci && npm run build

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint:all

      - name: Frontend tests
        run: npm run test:frontend

      - name: Build frontend
        env:
          VITE_API_URL: https://api.placeholder.example
          VITE_APP_ENV: production
        run: npm run build

      - name: Backend tests
        env:
          NODE_ENV: test
          DATABASE_URL: mongodb://localhost:27017/vsaas_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-min-64-chars-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET: test-refresh-secret-min-64-chars-aaaaaaaaaaaaaaaaaaaaaaaaaaaa
          PORTAL_JWT_SECRET: test-portal-secret-min-64-chars-aaaaaaaaaaaaaaaaaaaaaaaaaaaa
          CSRF_SECRET: test-csrf-secret-min-32-chars-aaa
          FRONTEND_URL: http://localhost:3000
        run: cd backend && npm run test:ci

      - name: E2E tests (Cypress)
        env:
          VITE_API_URL: https://api.placeholder.example
        run: |
          npx vite preview --port 3000 &
          npx wait-on http://localhost:3000 --timeout 30000
          npx cypress run --spec 'cypress/e2e/press-releases.cy.ts'
