version: '3.8'

services:
  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    networks:
      - vsaas-network
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try {
            rs.status().ok === 1 ? quit(0) : quit(1)
          } catch(e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
            quit(0)
          }
        "
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vsaas-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - vsaas-network

  api:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - "5000:5000"
    env_file:
      - ../../backend/.env
    environment:
      # replicaSet=rs0 is required for multi-document transactions (P0-1)
      DATABASE_URL: mongodb://mongo:27017/vsaas?replicaSet=rs0
      REDIS_URL: redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend/src:/app/backend/src
      - ../../packages:/app/packages
    networks:
      - vsaas-network

  worker:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.api
    command: node dist/worker.js
    env_file:
      - ../../backend/.env
    environment:
      DATABASE_URL: mongodb://mongo:27017/vsaas?replicaSet=rs0
      REDIS_URL: redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../../backend/src:/app/backend/src
      - ../../packages:/app/packages
    networks:
      - vsaas-network

  frontend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - api
    volumes:
      - ../../src:/app/src
      - ../../packages:/app/packages
    networks:
      - vsaas-network

volumes:
  mongo-data:
  redis-data:

networks:
  vsaas-network:
    driver: bridge
