version: '3.8'

services:
  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    # --replSet enables replica set mode required for multi-document transactions (P0-1)
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    networks:
      - vsaas-network
    healthcheck:
      # Wait until the replica set is initiated before reporting healthy
      test: >
        mongosh --quiet --eval "
          try {
            rs.status().ok === 1 ? quit(0) : quit(1)
          } catch(e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
            quit(0)
          }
        "
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vsaas-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - vsaas-network

volumes:
  mongo-data:
  redis-data:

networks:
  vsaas-network:
    driver: bridge
